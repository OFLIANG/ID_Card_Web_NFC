<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.3, maximum-scale=5.0, user-scalable=yes">
    <title>LeongBro_IDCard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="three.min.js"></script>
</head>

<body>

    <!-- ═══════ Three.js 3D Canvas ═══════ -->
    <canvas id="globe-canvas"></canvas>

    <!-- ═══════ 2D Overlay Canvas (scan lines) ═══════ -->
    <canvas id="overlay-canvas"></canvas>

    <!-- ═══════ Mouse/Touch Particle Canvas ═══════ -->
    <canvas id="particle-canvas"></canvas>

    <!-- ═══════ HTML UI Overlay ═══════ -->
    <div class="ui-overlay">

        <!-- 顶部遥感数据条 -->
        <div class="telemetry-bar">
            <div class="telemetry-item">
                <span class="telemetry-label" data-i18n="telemetry-label-sat">卫星</span>
                <span class="telemetry-value" id="satId">GF-07</span>
            </div>
            <div class="telemetry-dot"></div>
            <div class="telemetry-item">
                <span class="telemetry-label" data-i18n="telemetry-label-alt">高度</span>
                <span class="telemetry-value" id="satAlt">507km</span>
            </div>
            <div class="telemetry-dot"></div>
            <div class="telemetry-item">
                <span class="telemetry-label" data-i18n="telemetry-label-status">状态</span>
                <span class="telemetry-value blink" data-i18n="telemetry-value-status">运行中</span>
            </div>
            <div class="telemetry-dot"></div>
            <button class="lang-toggle" id="langToggle" onclick="switchLang()" data-i18n="lang-switch">EN</button>
        </div>

        <!-- 缩放控制 -->
        <div class="fab-zoom" id="fabZoom">
            <div class="fab-zoom-palette" id="fabPalette">
                <button class="fab-zoom-item" onclick="zoomIn()" title="放大">
                    <i class="fas fa-plus"></i>
                </button>
                <div class="fab-zoom-level" id="zoomLevel">100%</div>
                <button class="fab-zoom-item" onclick="zoomOut()" title="缩小">
                    <i class="fas fa-minus"></i>
                </button>
                <div class="fab-zoom-divider"></div>
                <button class="fab-zoom-item" onclick="zoomReset()" title="重置">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
            <button class="fab-zoom-main" id="fabMain" onclick="toggleFabPalette()">
                <i class="fas fa-arrows-up-down-left-right" id="fabIcon"></i>
            </button>
        </div>

        <!-- 主内容卡片 -->
        <div class="card-container">
            <div class="glass-card" id="mainCard">

                <!-- 头像区 -->
                <div class="avatar-ring">
                    <div class="avatar-inner">
                        <span class="avatar-text">LC</span>
                    </div>
                    <div class="avatar-pulse"></div>
                </div>

                <!-- 名字 -->
                <h1 class="name-cn">梁超</h1>
                <h2 class="name-en">LeongBro</h2>
                <div class="subtitle-line">
                    <span class="sub-dash"></span>
                    <span class="sub-text" data-i18n="subtitle">遥感 · 连接</span>
                    <span class="sub-dash"></span>
                </div>

                <!-- 通信频道 -->
                <div class="section-block">
                    <div class="section-header">
                        <i class="fas fa-satellite-dish"></i>
                        <span data-i18n="section-contact">通信频道</span>
                        <div class="header-line"></div>
                    </div>
                    <div class="contact-list">
                        <a href="tel:13153152494" class="contact-item">
                            <div class="item-icon"><i class="fas fa-phone"></i></div>
                            <div class="item-info">
                                <span class="item-label" data-i18n="label-tel">电话 TEL</span>
                                <span class="item-value">131 5315 2494</span>
                            </div>
                            <div class="item-arrow"><i class="fas fa-chevron-right"></i></div>
                        </a>
                        <a href="mailto:13153152494@163.com" class="contact-item">
                            <div class="item-icon"><i class="fas fa-envelope"></i></div>
                            <div class="item-info">
                                <span class="item-label" data-i18n="label-email">邮箱 EMAIL</span>
                                <span class="item-value">13153152494@163.com</span>
                            </div>
                            <div class="item-arrow"><i class="fas fa-chevron-right"></i></div>
                        </a>
                        <a href="javascript:void(0)" class="contact-item" id="wechatLink">
                            <div class="item-icon"><i class="fab fa-weixin"></i></div>
                            <div class="item-info">
                                <span class="item-label" data-i18n="label-wechat">微信 WECHAT</span>
                                <span class="item-value">Life_Copy</span>
                            </div>
                            <div class="item-arrow"><i class="fas fa-copy"></i></div>
                        </a>
                    </div>
                </div>

                <!-- 数据链路 -->
                <div class="section-block">
                    <div class="section-header">
                        <i class="fas fa-globe"></i>
                        <span data-i18n="section-data">数据链路</span>
                        <div class="header-line"></div>
                    </div>
                    <div class="social-grid">
                        <a href="https://github.com/OFLIANG" target="_blank" class="social-item">
                            <i class="fab fa-github"></i>
                            <span>GitHub</span>
                        </a>
                        <a href="https://v.douyin.com/LEO7mUvCcsg/" target="_blank" class="social-item">
                            <i class="fab fa-tiktok"></i>
                            <span data-i18n="social-douyin">抖音</span>
                        </a>
                        <a href="https://y.music.163.com/m/user?id=1810943693" target="_blank" class="social-item">
                            <i class="fa-solid fa-compact-disc"></i>
                            <span data-i18n="social-netease">网易云音乐</span>
                        </a>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="action-row">
                    <button class="btn-action btn-primary" onclick="downloadVCard(); hapticFeedback('tap');">
                        <i class="fas fa-address-card"></i>
                        <span data-i18n="btn-save">保存联系人</span>
                    </button>
                    <button class="btn-action btn-secondary" onclick="shareCard(); hapticFeedback('tap');">
                        <i class="fas fa-share-alt"></i>
                        <span data-i18n="btn-share">分享名片</span>
                    </button>
                </div>

                <!-- NFC 脉冲 -->
                <div class="nfc-footer">
                    <div class="signal-rings">
                        <div class="ring ring-1"></div>
                        <div class="ring ring-2"></div>
                        <div class="ring ring-3"></div>
                    </div>
                    <div class="nfc-icon"><i class="fas fa-broadcast-tower"></i></div>
                    <span class="nfc-text" data-i18n="nfc-text">NFC · 触碰即达</span>
                </div>

            </div>
        </div>

        <!-- 底部留白，手机端上下滑动用 -->
        <div class="scroll-spacer"></div>

        <!-- 微信二维码弹窗 -->
        <div class="wechat-modal" id="wechatModal">
            <div class="wechat-modal-backdrop" onclick="closeWeChatModal()"></div>
            <div class="wechat-modal-content">
                <div class="wechat-modal-header">
                    <i class="fab fa-weixin"></i>
                    <span data-i18n="wechat-title">添加微信好友</span>
                </div>
                <div class="wechat-qr-area">
                    <div class="wechat-qr-code" id="wechatQR">
                        <!-- QR code will be generated here -->
                    </div>
                    <div class="wechat-id-display">
                        <span class="wechat-id-label" data-i18n="wechat-id-label">微信ID</span>
                        <span class="wechat-id-value" id="wechatIdText">Life_Copy</span>
                        <button class="wechat-copy-btn" onclick="copyToClipboard('Life_Copy'); hapticFeedback('tap');">
                            <i class="fas fa-copy"></i> <span data-i18n="wechat-copy">复制</span>
                        </button>
                    </div>
                </div>
                <div class="wechat-modal-actions">
                    <button class="wechat-btn-open" onclick="launchWeChat(); hapticFeedback('tap');">
                        <i class="fab fa-weixin"></i> <span data-i18n="wechat-open">打开微信</span>
                    </button>
                    <button class="wechat-btn-close" onclick="closeWeChatModal(); hapticFeedback('tap');">
                        <span data-i18n="wechat-close">关闭</span>
                    </button>
                </div>
                <p class="wechat-hint" data-i18n="wechat-hint">长按识别二维码 或 复制ID搜索添加</p>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast">
            <i class="fas fa-check-circle"></i>
            <span id="toastText">已复制</span>
        </div>
    </div>

    <script defer src="main.js"></script>
</body>

</html>
